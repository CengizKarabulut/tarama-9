name: StockMarketLab Gunluk Performans

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/daily_report.yml"
      - "daily_report.py"
      - "weekly_report.py"
      - "performance_report.py"
      - "performance_image.py"
      - "scanner.py"
      - "requirements.txt"
  pull_request:
    paths:
      - ".github/workflows/daily_report.yml"
      - "daily_report.py"
      - "weekly_report.py"
      - "performance_report.py"
      - "performance_image.py"
      - "scanner.py"
      - "requirements.txt"
  schedule:
    # Weekdays at 19:15 Turkey time, after the BIST close and data settlement.
    - cron: "15 16 * * 1-5"
  repository_dispatch:
    types:
      - stockmarketlab-daily-report
  workflow_dispatch:

jobs:
  validate:
    name: validate performance report code
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Compile Python files
        run: |
          python -m py_compile \
            daily_report.py \
            weekly_report.py \
            performance_report.py \
            performance_image.py \
            scanner.py

  report:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || github.event_name == 'repository_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Generate and send daily report
        env:
          TV_USERNAME: ${{ secrets.TV_USERNAME }}
          TV_PASSWORD: ${{ secrets.TV_PASSWORD }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ vars.TG_CHAT_ID || secrets.TG_CHAT_ID }}
          TG_THREAD_ID: ${{ vars.TG_THREAD_ID || secrets.TG_THREAD_ID }}
        run: python daily_report.py
